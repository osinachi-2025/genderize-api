<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Genderize API Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0b0d11;
      --surface:   #13161c;
      --border:    #22262f;
      --accent:    #c8f060;
      --accent2:   #60c8f0;
      --text:      #e8eaf0;
      --muted:     #5a6070;
      --danger:    #f06080;
      --success:   #60f0a0;
      --radius:    6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 52px;
    }

    header .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      max-width: 420px;
      margin-inline: auto;
      line-height: 1.7;
    }

    /* ── SEARCH CARD ── */
    .search-card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      margin-bottom: 36px;
    }

    .search-card label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input[type="text"]:focus {
      border-color: var(--accent);
    }

    .input-row input[type="text"]::placeholder {
      color: var(--muted);
    }

    .btn-lookup {
      background: var(--accent);
      color: #0b0d11;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.06em;
      padding: 12px 22px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-lookup:hover   { opacity: 0.85; transform: translateY(-1px); }
    .btn-lookup:active  { transform: translateY(0); opacity: 1; }

    .btn-delete {
      background: var(--danger);
      color: #0b0d11;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-delete:hover   { opacity: 0.85; transform: translateY(-1px); }
    .btn-delete:active  { transform: translateY(0); opacity: 1; }

    /* flash message area */
    #flash-messages {
      width: 100%;
      max-width: 560px;
      margin-bottom: 24px;
    }

    /* Jinja2 flash blocks will render here; style them: */
    #flash-messages .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      border-left: 3px solid;
      margin-bottom: 8px;
    }
    #flash-messages .alert-error   { background: #1a0f13; border-color: var(--danger);  color: var(--danger);  }
    #flash-messages .alert-info    { background: #0d1520; border-color: var(--accent2); color: var(--accent2); }
    #flash-messages .alert-success { background: #0d1a14; border-color: var(--success); color: var(--success); }

    /* ── TABLE SECTION ── */
    .table-wrap {
      width: 100%;
      max-width: 1000px;
      overflow-x: auto;
    }

    .table-header-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .table-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    .table-count {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    thead th {
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 14px 14px;
      font-weight: 400;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:hover { background: var(--surface); }

    tbody td {
      padding: 16px 14px;
      vertical-align: middle;
      color: var(--text);
    }

    /* name cell */
    td.col-name {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    /* gender badge */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .badge-male    { background: #0d1a28; color: var(--accent2); border: 1px solid var(--accent2); }
    .badge-female  { background: #1a0d1a; color: #f060c8;        border: 1px solid #f060c8; }
    .badge-unknown { background: #1a1a0d; color: #c8c060;        border: 1px solid #c8c060; }

    /* probability bar */
    .prob-cell { min-width: 140px; }
    .prob-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .prob-bar-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .prob-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s ease;
    }
    .prob-value { color: var(--accent); font-size: 12px; min-width: 36px; }

    /* confidence */
    .conf-true  { color: var(--success); }
    .conf-false { color: var(--danger); }

    /* sample size */
    td.col-count { color: var(--muted); }

    /* timestamp */
    td.col-time { color: var(--muted); font-size: 12px; }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 13px; line-height: 1.8; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="eyebrow">API Explorer</div>
    <h1>Genderize<span>.</span>io</h1>
    <p>Look up gender predictions for any name using the Genderize API. Results are stored in the table below.</p>
  </header>

  <!-- ── FLASH MESSAGES (Flask will inject here) ── -->
  <div id="flash-messages">
    <!--
      Flask usage:
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
    -->
  </div>

  <!-- ── SEARCH CARD ── -->
  <div class="search-card">
    <label for="name-input">Enter a name</label>
    <form id="name-form" onsubmit="handleSubmit(event)">
      <div class="input-row">
        <input
          type="text"
          id="name-input"
          name="name"
          placeholder="e.g. Alex, Jordan, Priya…"
          autocomplete="off"
        />
        <button type="submit" class="btn-lookup">Look up →</button>
      </div>
    </form>
  </div>

  <!-- ── RESULTS TABLE ── -->
  <div class="table-wrap">
    <div class="table-header-row">
      <span class="table-title">Results</span>
      <!--
        Flask usage:  <span class="table-count">{{ results|length }} ENTR{% if results|length != 1 %}IES{% else %}Y{% endif %}</span>
      -->
      <span class="table-count"><span id="entry-count">0</span> ENTRIES</span>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Gender</th>
          <th>Probability</th>
          <th>Confident</th>
          <th>Sample Size</th>
          <th>Timestamp</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="results-tbody">
        <!-- Results will be inserted here -->
      </tbody>
    </table>
  </div>

</body>

<script>
  let resultsData = [];

  async function handleSubmit(event) {
    event.preventDefault();
    const name = document.getElementById('name-input').value.trim();
    
    if (!name) {
      showError('Missing or empty name parameter');
      return;
    }

    try {
      const response = await fetch('/api/classify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });

      if (!response.ok) {
        const error = await response.json();
        showError(error.error || 'Failed to classify name');
        return;
      }

      const data = await response.json();
      console.log('API Response:', data);
      resultsData.push(data);
      updateTable();
      document.getElementById('name-input').value = '';
      showSuccess(`${data.name} has been classified as ${data.gender || 'unknown'}`);
    } catch (error) {
      console.error('Error:', error);
      showError('Network error. Please try again.');
    }
  }

  function updateTable() {
    const tbody = document.getElementById('results-tbody');
    const countSpan = document.getElementById('entry-count');
    
    tbody.innerHTML = '';
    
    resultsData.forEach((item, index) => {
      const genderBadgeClass = item.gender === 'male' ? 'badge-male' : item.gender === 'female' ? 'badge-female' : 'badge-unknown';
      const genderText = item.gender ? item.gender.charAt(0).toUpperCase() + item.gender.slice(1) : 'Unknown';
      const confidenceClass = item.is_confident ? 'conf-true' : 'conf-false';
      const confidenceText = item.is_confident ? '✓ Yes' : '✗ No';
      const probabilityPercent = Math.round((item.probability || 0) * 100);

      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${index + 1}</td>
        <td class="col-name">${item.name}</td>
        <td><span class="badge ${genderBadgeClass}">${genderText}</span></td>
        <td class="prob-cell">
          <div class="prob-bar-wrap">
            <div class="prob-bar-track">
              <div class="prob-bar-fill" style="width: ${probabilityPercent}%"></div>
            </div>
            <span class="prob-value">${probabilityPercent}%</span>
          </div>
        </td>
        <td class="${confidenceClass}">${confidenceText}</td>
        <td class="col-count">${item.sample_size || 0}</td>
        <td class="col-time">${item.request_time}</td>
        <td><button class="btn-delete" onclick="deleteRow(${index})">Delete</button></td>
      `;
      tbody.appendChild(row);
    });

    countSpan.textContent = resultsData.length;
  }

  function showError(message) {
    const flashDiv = document.getElementById('flash-messages');
    const alert = document.createElement('div');
    alert.className = 'alert alert-error';
    alert.textContent = message;
    flashDiv.innerHTML = '';
    flashDiv.appendChild(alert);
    setTimeout(() => alert.remove(), 5000);
  }

  function showSuccess(message) {
    const flashDiv = document.getElementById('flash-messages');
    const alert = document.createElement('div');
    alert.className = 'alert alert-success';
    alert.textContent = message;
    flashDiv.innerHTML = '';
    flashDiv.appendChild(alert);
    setTimeout(() => alert.remove(), 5000);
  }

  function deleteRow(index) {
    const deletedName = resultsData[index].name;
    resultsData.splice(index, 1);
    updateTable();
    showSuccess(`${deletedName} has been removed from the results`);
  }
</script>
</html>
